# default：标准完整链路。适合大多数功能开发、较复杂缺陷修复和黑客松主流程展示。
[role_sets.default]
roles = ["architect", "implementer", "tester", "reviewer"]

# fast-path：小范围修复与快速验证。适合低风险问题、紧凑演示和快速迭代。
[role_sets.fast-path]
roles = ["implementer", "reviewer"]

# delivery：偏交付链路。适合需求已较清晰、重点在实现与集成的任务。
[role_sets.delivery]
roles = ["architect", "implementer", "reviewer"]

# hardening：偏稳健链路。适合回归治理、补验证、可靠性收口和上线前加固。
[role_sets.hardening]
roles = ["implementer", "tester", "reviewer"]
